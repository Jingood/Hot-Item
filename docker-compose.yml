version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hot_item_db
    environment:
      POSTGRES_DB: hot_item_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7.2-alpine
    container_name: hot_item_redis
    ports:
      - "6379:6379"


  web:
    build: .
    container_name: hot_item_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
